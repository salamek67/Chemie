<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Periodická tabulka prvků</title>
  <style>
    :root {
      --bg: #f6f7f3;
      --panel: #ffffff;
      --ink: #18201f;
      --muted: #697371;
      --line: rgba(24, 32, 31, .13);
      --shadow: 0 22px 70px rgba(22, 28, 26, .14);
      --radius: 8px;
      --alkali: #e54949;
      --alkaline: #ee8c2f;
      --transition: #d3a11f;
      --metal: #4f9e61;
      --metalloid: #2f9c91;
      --nonmetal: #3497c9;
      --halogen: #7169d9;
      --noble: #a556c5;
      --lanthanide: #c95d8f;
      --actinide: #8d6b4f;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        linear-gradient(180deg, rgba(255,255,255,.72), rgba(246,247,243,.96) 44%),
        radial-gradient(circle at 12% 8%, rgba(47,156,145,.13), transparent 28%),
        radial-gradient(circle at 86% 12%, rgba(229,73,73,.11), transparent 24%),
        var(--bg);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(1540px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 30px 0 48px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 24px;
      margin-bottom: 22px;
    }

    header.quiz-mode > div,
    header.quiz-mode .toolbar {
      display: none;
    }
    header.quiz-mode {
      margin-bottom: 0;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 4vw, 4.4rem);
      line-height: .95;
      letter-spacing: 0;
      animation: elementEnter .35s ease backwards;
    }

    .lead {
      max-width: 680px;
      margin: 12px 0 0;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.55;
      animation: elementEnter .35s ease backwards;
      animation-delay: 80ms;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-end;
      max-width: 720px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      min-height: 32px;
      padding: 6px 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255,255,255,.72);
      color: #27302e;
      font-size: .78rem;
      font-weight: 650;
      white-space: nowrap;
      cursor: pointer;
      transition: background .16s ease, color .16s ease, border-color .16s ease, box-shadow .16s ease;
      touch-action: manipulation;
    }

    .chip.active {
      background: #17201e;
      color: white;
      border-color: #17201e;
      box-shadow: 0 12px 28px rgba(22,28,26,.18);
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--color);
    }

    .table-shell {
      position: relative;
      padding: 12px;
      border: 1px solid rgba(24,32,31,.1);
      border-radius: 16px;
      background: rgba(255,255,255,.72);
      box-shadow: var(--shadow);
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    .table-shell.hidden {
      display: none;
    }

    .periodic-table {
      position: relative;
      display: grid;
      grid-template-columns: 40px repeat(18, minmax(64px, 1fr));
      grid-template-rows: 40px repeat(10, 76px);
      grid-auto-rows: 76px;
      gap: 7px;
      min-width: 1330px;
    }

    .axis-label {
      display: grid;
      place-items: center;
      min-width: 0;
      border: 1px solid rgba(24,32,31,.12);
      border-radius: 8px;
      background: rgba(255,255,255,.78);
      color: #45504e;
      font-size: .7rem;
      font-weight: 850;
      line-height: 1.05;
      text-align: center;
      cursor: pointer;
      user-select: none;
      transition: background .16s ease, color .16s ease, transform .16s ease, box-shadow .16s ease;
    }

    .axis-label.column {
      min-height: 40px;
      grid-row: 1;
    }

    .axis-label span {
      display: block;
      color: inherit;
      font-size: .57rem;
      opacity: .82;
    }

    .axis-label:hover,
    .axis-label.active {
      background: #17201e;
      color: white;
      transform: translateY(-2px);
      box-shadow: 0 12px 28px rgba(22,28,26,.18);
    }

    .element {
      --color: #919995;
      position: relative;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 2px;
      min-width: 0;
      padding: 7px;
      border: 1px solid color-mix(in srgb, var(--color) 28%, white);
      border-radius: var(--radius);
      background: color-mix(in srgb, var(--color) 18%, white);
      color: #17201e;
      cursor: default;
      transition: transform .16s ease, border-color .16s ease, box-shadow .16s ease, background .16s ease;
      touch-action: manipulation;
    }

    @keyframes elementEnter {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .chip, .axis-label, .element {
      animation: elementEnter .35s ease backwards;
    }

    .quiz-btn {
      animation: elementEnter .35s ease backwards;
    }

    .element.is-rich {
      background: linear-gradient(145deg, color-mix(in srgb, var(--color) 86%, white), var(--color));
      border-color: color-mix(in srgb, var(--color) 75%, black);
      color: white;
      box-shadow: 0 10px 28px color-mix(in srgb, var(--color) 34%, transparent);
    }

    .periodic-table.is-filtering .element.is-rich:not(.temp-rich) {
      background: color-mix(in srgb, var(--color) 18%, white);
      border-color: color-mix(in srgb, var(--color) 28%, white);
      color: #17201e;
      box-shadow: none;
    }

    .element.temp-rich {
      background: linear-gradient(145deg, color-mix(in srgb, var(--color) 86%, white), var(--color));
      border-color: color-mix(in srgb, var(--color) 75%, black);
      color: white;
      box-shadow: 0 10px 28px color-mix(in srgb, var(--color) 34%, transparent);
    }

    .element:hover,
    .element:focus-visible {
      z-index: 20;
      transform: translateY(-4px);
      border-color: color-mix(in srgb, var(--color) 70%, black);
      box-shadow: 0 18px 42px rgba(22,28,26,.22);
      outline: none;
    }

    .number {
      font-size: .67rem;
      font-weight: 700;
      opacity: .8;
    }

    .symbol {
      align-self: center;
      font-size: 1.62rem;
      line-height: 1;
      font-weight: 850;
      letter-spacing: 0;
    }

    .name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: .66rem;
      font-weight: 720;
      opacity: .92;
    }

    .popover {
      display: none;
    }

    .wiki-tooltip {
      position: fixed;
      width: 370px;
      padding: 12px;
      border: 1px solid rgba(24,32,31,.12);
      border-radius: 10px;
      background: rgba(255,255,255,.96);
      box-shadow: 0 18px 55px rgba(21,27,25,.24);
      color: var(--ink);
      z-index: 9999;
      opacity: 0;
      pointer-events: none;
      transform: translateY(8px);
      transition: opacity .14s ease, transform .14s ease;
      backdrop-filter: blur(12px);
      overflow: visible;
    }

    .wiki-tooltip.visible {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0);
    }

    .wiki-tooltip h2 {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      margin: 0 0 8px;
      font-size: 1.18rem;
      letter-spacing: 0;
    }

    .wiki-tooltip .big-symbol {
      color: var(--color);
      font-size: 1.55rem;
      font-weight: 900;
    }

    .tooltip-media {
      display: grid;
      gap: 10px;
      margin-bottom: 10px;
      overflow: visible;
    }

    .visuals {
      position: relative;
      display: grid;
      grid-template-columns: 104px 104px 1fr;
      gap: 10px;
      align-items: stretch;
      overflow: visible;
      padding: 22px;
      margin: -22px;
    }

    .element-image,
    .atom-diagram,
    .wiki-link {
      position: relative;
      width: 104px;
      height: 104px;
      border-radius: 8px;
      background: #eef2ee;
      border: 1px solid rgba(24,32,31,.08);
      transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
      transform-origin: center;
    }

    .element-image::before,
    .atom-diagram::before,
    .wiki-link::before {
      content: "";
      position: absolute;
      inset: -18px;
    }

    .element-image.zoomed,
    .atom-diagram.zoomed {
      transform: scale(var(--zoom, 1.75));
      border-color: color-mix(in srgb, var(--color) 55%, white);
      box-shadow: 0 26px 70px rgba(21,27,25,.32);
      z-index: 15;
    }

    .element-image {
      object-fit: cover;
      display: block;
    }

    .element-image.loaded {
      background: white;
    }

    .atom-diagram {
      position: relative;
      overflow: hidden;
      background:
        radial-gradient(circle at center, rgba(255,255,255,.92), rgba(238,242,238,.82)),
        #eef2ee;
    }

    .nucleus {
      position: absolute;
      left: 50%;
      top: 50%;
      z-index: 3;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--color);
      color: white;
      font-size: .7rem;
      font-weight: 850;
      box-shadow: 0 7px 18px color-mix(in srgb, var(--color) 34%, transparent);
      transform: translate(-50%, -50%) scale(var(--nucleus-scale, 1));
      text-align: center;
      line-height: 1;
    }

    .nucleus small {
      display: block;
      margin-top: 2px;
      font-size: .45rem;
      font-weight: 760;
      opacity: .92;
    }

    .atom-shell {
      position: absolute;
      left: 50%;
      top: 50%;
      border-radius: 50%;
      border: 1px solid color-mix(in srgb, var(--color) 44%, white);
      transform: translate(-50%, -50%);
    }

    .atom-electron {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #17201e;
      box-shadow: 0 0 0 1.5px rgba(255,255,255,.78);
      transform: translate(-50%, -50%) rotate(var(--angle)) translateX(var(--radius)) rotate(calc(-1 * var(--angle))) scale(var(--electron-scale, 1));
    }

    .tooltip-summary {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .facts {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      margin: 0;
    }

    .fact {
      padding: 7px;
      border-radius: 7px;
      background: #f3f5f1;
    }

    .fact span {
      display: block;
      color: var(--muted);
      font-size: .64rem;
      font-weight: 700;
      text-transform: uppercase;
    }

    .fact strong {
      display: block;
      overflow-wrap: anywhere;
      font-size: .76rem;
      line-height: 1.2;
    }

    .safety {
      position: relative;
      display: inline-flex;
      width: fit-content;
      min-height: 30px;
      align-items: center;
      gap: 7px;
      padding: 0 9px;
      border-radius: 8px;
      background: #f3f5f1;
      color: #34413e;
      font-size: .75rem;
      font-weight: 800;
      cursor: help;
    }

    .safety-card {
      position: absolute;
      left: 0;
      bottom: calc(100% + 4px);
      width: 380px;
      padding: 10px;
      border: 1px solid rgba(24,32,31,.12);
      border-radius: 8px;
      background: white;
      box-shadow: 0 18px 42px rgba(21,27,25,.2);
      color: #42504d;
      opacity: 0;
      pointer-events: none;
      transform: translateY(6px);
      transition: opacity .14s ease, transform .14s ease;
      z-index: 30;
    }

    .safety-card::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      top: 100%;
      height: 12px;
    }

    .safety.hover .safety-card,
    .safety:focus-within .safety-card,
    .safety.open .safety-card {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0);
    }

    .safety-card strong {
      display: block;
      margin-bottom: 4px;
      color: var(--ink);
      font-size: .8rem;
    }

    .safety-row {
      margin-top: 6px;
      font-size: .74rem;
      line-height: 1.35;
    }

    .rs-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 5px;
    }

    .rs-chip {
      position: relative;
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      padding: 0 8px;
      border-radius: 7px;
      background: #17201e;
      color: white;
      font-size: .72rem;
      font-weight: 850;
    }

    .rs-detail {
      position: absolute;
      left: 0;
      bottom: calc(100% + 3px);
      width: 300px;
      padding: 8px;
      border: 1px solid rgba(24,32,31,.12);
      border-radius: 8px;
      background: white;
      color: #42504d;
      box-shadow: 0 16px 36px rgba(21,27,25,.2);
      opacity: 0;
      pointer-events: none;
      transform: translateY(5px);
      transition: opacity .14s ease, transform .14s ease;
      z-index: 40;
    }

    .rs-detail::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      top: 100%;
      height: 10px;
    }

    .rs-detail ul {
      margin: 0;
      padding-left: 18px;
    }

    .rs-detail li {
      margin: 3px 0;
    }

    .rs-chip.hover .rs-detail,
    .rs-chip:focus-within .rs-detail,
    .rs-chip.open .rs-detail {
      opacity: 1;
      transform: translateY(0);
    }

    .ghs-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 10px;
    }

    .ghs-mark {
      display: grid;
      place-items: center;
      width: 42px;
      height: 42px;
      transform: rotate(45deg);
      overflow: hidden;
    }

    .ghs-mark svg,
    .ghs-mark img,
    .ghs-mark span {
      transform: rotate(-45deg);
    }

    .ghs-mark img {
      width: 31px;
      height: 31px;
      object-fit: contain;
      display: block;
      background: none;
    }

    .safety-icons {
      display: inline-flex;
      gap: 8px;
      align-items: center;
      margin-right: 2px;
      flex-wrap: wrap;
    }

    .safety-icons .ghs-mark {
      width: 28px;
      height: 28px;
      border-width: 2px;
      flex: 0 0 auto;
    }

    .safety-icons .ghs-mark img {
      width: 19px;
      height: 19px;
    }

    .safety-label {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      font-size: .76rem;
      font-weight: 800;
      letter-spacing: 0;
      white-space: nowrap;
      gap: 0;
    }

    .wiki-tooltip p {
      margin: 0;
      color: #42504d;
      font-size: .82rem;
      line-height: 1.45;
    }

    .wiki-link {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #17201e;
      color: white;
      font-size: .82rem;
      font-weight: 760;
      text-decoration: none;
      text-align: center;
      line-height: 1.2;
      padding: 10px;
    }

    .wiki-link:hover {
      background: var(--color);
      border-color: color-mix(in srgb, var(--color) 55%, white);
    }

    .wiki-link span {
      display: block;
      margin-top: 7px;
      font-size: 1.35rem;
      line-height: 1;
    }

    .atom-meta {
      display: block;
      margin-top: 5px;
      color: var(--muted);
      font-size: .73rem;
      font-weight: 750;
    }

    .quiz {
      margin: 26px auto 0;
      max-width: 880px;
      border: 1px solid rgba(24,32,31,.1);
      border-radius: 16px;
      background: rgba(255,255,255,.82);
      box-shadow: 0 16px 48px rgba(22,28,26,.1);
      transition: padding .3s ease, box-shadow .3s ease;
    }

    .quiz.closed {
      margin: 26px auto 0;
      padding: 6px;
    }

    .quiz.closed:hover {
      box-shadow: 0 18px 52px rgba(22,28,26,.16);
    }

    .quiz.open {
      margin: auto;
      padding: 18px;
    }

    .quiz-btn {
      display: block;
      width: 100%;
      padding: 14px;
      border: 0;
      border-radius: 12px;
      background: #17201e;
      color: white;
      font: inherit;
      font-size: 1.05rem;
      font-weight: 760;
      cursor: pointer;
      transition: background .2s;
    }

    .quiz-btn:hover {
      background: #2f3a37;
    }

    .quiz-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
    }

    .quiz-body {
      max-height: 0;
      overflow: hidden;
      opacity: 0;
      transition: max-height .4s ease, opacity .3s ease;
    }

    .quiz-body.visible {
      max-height: 600px;
      opacity: 1;
    }

    .mode-switch {
      display: grid;
      width: 100%;
      grid-template-columns: repeat(4, 1fr);
      gap: 4px;
      padding: 4px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #f1f3ef;
    }

    button {
      min-height: 40px;
      border: 0;
      border-radius: 8px;
      font: inherit;
      font-weight: 760;
      cursor: pointer;
    }

    .mode-switch button {
      padding: 0 12px;
      background: transparent;
      color: #43504d;
      white-space: nowrap;
    }

    .mode-switch button.active {
      background: #17201e;
      color: white;
      box-shadow: 0 5px 15px rgba(22,28,26,.16);
    }

    .quiz-card {
      display: block;
    }

    .quiz-card .score {
      float: right;
      margin: 0 0 8px 12px;
      line-height: inherit;
    }

    .question {
      min-height: 86px;
      padding: 16px;
      border-radius: 12px;
      background: #f3f6f0;
      border: 1px solid rgba(24,32,31,.08);
    }

    .question small {
      display: block;
      margin-bottom: 6px;
      color: var(--muted);
      font-weight: 760;
    }

    .question strong {
      font-size: clamp(1.9rem, 5vw, 3.2rem);
      line-height: 1;
    }

    .answer-row {
      display: grid;
      grid-template-columns: 1fr auto auto auto;
      gap: 9px;
      margin-top: 12px;
    }

    input {
      width: 100%;
      min-height: 44px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: white;
      color: var(--ink);
      font: inherit;
      font-weight: 650;
    }

    input:focus {
      border-color: #2f9c91;
      outline: 3px solid rgba(47,156,145,.18);
    }

    .primary {
      padding: 0 16px;
      background: #2f9c91;
      color: white;
    }

    .secondary {
      padding: 0 16px;
      background: #17201e;
      color: white;
    }

    .feedback {
      min-height: 24px;
      margin: 10px 0 0;
      color: var(--muted);
      font-weight: 720;
    }

    .feedback.ok {
      color: #247846;
    }

    .feedback.bad {
      color: #b33b35;
    }

    .score {
      color: var(--muted);
      font-weight: 750;
      white-space: nowrap;
    }

    .quiz-results {
      margin-top: 16px;
      padding: 16px;
      border-radius: 12px;
      background: #f3f6f0;
      border: 1px solid rgba(24,32,31,.08);
    }

    .quiz-results h3 {
      margin: 0 0 8px;
      font-size: 1.05rem;
    }

    .quiz-results ul {
      margin: 8px 0;
      padding-left: 20px;
    }

    .quiz-results li {
      margin: 4px 0;
      font-size: .85rem;
    }

    .quiz-results .wrong {
      color: #b33b35;
    }

    .quiz-results .right {
      color: #247846;
    }

    @media (max-width: 900px) {
      main {
        width: min(100vw - 20px, 1540px);
        padding-top: 18px;
      }

      header,
      .quiz-top,
      .quiz-card {
        display: block;
      }

      .toolbar {
        justify-content: flex-start;
        margin-top: 18px;
      }

      .answer-row {
        grid-template-columns: 1fr;
      }

      .score {
        float: none;
        display: block;
        margin-top: 12px;
      }
    }

    @media (max-width: 700px) {
      .wiki-tooltip {
        width: calc(100vw - 20px);
        max-width: 370px;
      }

      .visuals {
        grid-template-columns: 1fr 1fr;
      }

      .wiki-link {
        grid-column: 1 / -1;
        width: auto;
        height: 48px;
        flex-direction: row;
        gap: 8px;
      }

      .wiki-link span {
        margin-top: 0;
        font-size: 1rem;
      }

      .safety-card {
        width: calc(100vw - 40px);
        max-width: 380px;
      }

      .rs-detail {
        width: calc(100vw - 40px);
        max-width: 300px;
      }

      .mode-switch {
        grid-template-columns: 1fr 1fr;
      }

      .score {
        float: none;
        display: block;
        margin-top: 8px;
      }

      .element .symbol {
        font-size: 1.2rem;
      }

      .element .name {
        font-size: .55rem;
      }

      .element .number {

    function wikiPageTitle(element) {
      return wikiTitleOverrides[element.symbol] || element.name;
    }

    function physicalFacts(element, group) {
      if (physicalOverrides[element.symbol]) return physicalOverrides[element.symbol];
      const metallic = ["alkali", "alkaline", "transition", "metal", "lanthanide", "actinide"].includes(element.group);
      const state = liquidSymbols.has(element.symbol) ? "kapalina" : gasSymbols.has(element.symbol) ? "plyn" : "pevná látka";
      return {
        appearance: metallic ? "stříbřitý/šedý kov" : group.label.toLocaleLowerCase("cs-CZ"),
        density: "-",
        state,
        hardness: "-",
        melt: "-",
        boil: "-"
      };
    }

        const items = numbers.map((number) => {
          const itemCode = `${prefix}${number}`;
          return `<li>${itemCode}: ${meanings[itemCode]}</li>`;

        return `<ul>${items}</ul>`;
      };

    function electronShells(atomicNumber, symbol) {
      const orbitals = [
        [1, 2], [2, 2], [2, 6], [3, 2], [3, 6], [4, 2], [3, 10],
        [4, 6], [5, 2], [4, 10], [5, 6], [6, 2], [4, 14], [5, 10],
        [6, 6], [7, 2], [5, 14], [6, 10], [7, 6]
      ];
      const exceptions = {
        Cr: [2, 8, 13, 1],
        Cu: [2, 8, 18, 1],
        Nb: [2, 8, 18, 12, 1],
        Mo: [2, 8, 18, 13, 1],
        Ru: [2, 8, 18, 15, 1],
        Rh: [2, 8, 18, 16, 1],
        Pd: [2, 8, 18, 18],
        Ag: [2, 8, 18, 18, 1],
        Pt: [2, 8, 18, 32, 17, 1],
        Au: [2, 8, 18, 32, 18, 1]
      };

      if (exceptions[symbol]) return exceptions[symbol];

      const shells = Array(7).fill(0);
      let remaining = atomicNumber;
      for (const [shell, capacity] of orbitals) {
        if (remaining <= 0) break;
        const used = Math.min(capacity, remaining);
        shells[shell - 1] += used;
        remaining -= used;
      }
      return shells.filter(Boolean);
    }

    function atomDiagram(element) {
      const shells = electronShells(element.number, element.symbol);
      const massNumber = parseMassNumber(element.mass);
      const neutrons = Math.max(0, massNumber - element.number);
      const maxRadius = 43;
      const step = shells.length > 1 ? (maxRadius - 16) / (shells.length - 1) : 0;
      const shellHtml = shells.map((count, shellIndex) => {
        const radius = shells.length === 1 ? 31 : 16 + shellIndex * step;
        const electronRadius = radius;
        const shellSize = radius * 2;
        const electrons = Array.from({ length: count }, (_, electronIndex) => {
          const angle = (360 / count) * electronIndex - 90 + shellIndex * 11;
          return `<span class="atom-electron" style="--angle:${angle}deg; --radius:${electronRadius}px"></span>`;
        }).join("");
        return `<span class="atom-shell" style="width:${shellSize}px; height:${shellSize}px">${electrons}</span>`;
      }).join("");

      return `
        ${shellHtml}
        <span class="nucleus">${element.symbol}<small>${element.number}p ${neutrons}n</small></span>
      `;
    }

    function nucleusScale(zoom) {
      return ((1 + (zoom - 1) * 0.5) / zoom).toFixed(3);
    }

    function clearMediaZoom() {
      wikiTooltip.querySelectorAll(".zoomed").forEach((item) => {
        if (item.dataset.zoomLocked) return;
        item.classList.remove("zoomed");
        item.style.removeProperty("--zoom");
        item.style.removeProperty("--electron-scale");
        item.style.removeProperty("--nucleus-scale");
      });
    }

    function updateMediaZoom(event) {
      if (event.target.closest(".wiki-link")) {
        clearMediaZoom();
        return;
      }

      const targets = [...wikiTooltip.querySelectorAll(".element-image, .atom-diagram")];
      let closest = null;
      let closestDistance = Infinity;

      targets.forEach((target) => {
        if (target.dataset.zoomLocked) return;
        const rect = target.getBoundingClientRect();
        const expansion = rect.width * .42;
        const inside =
          event.clientX >= rect.left - expansion &&
          event.clientX <= rect.right + expansion &&
          event.clientY >= rect.top - expansion &&
          event.clientY <= rect.bottom + expansion;

        if (!inside) return;

        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;
        const distance = Math.hypot(event.clientX - centerX, event.clientY - centerY);
        if (distance < closestDistance) {
          closest = target;
          closestDistance = distance;
        }
      });

      if (!closest) {
        clearMediaZoom();
        return;
      }

      targets.forEach((target) => {
        if (target.dataset.zoomLocked) return;
        if (target === closest) return;
        target.classList.remove("zoomed");
        target.style.removeProperty("--zoom");
        target.style.removeProperty("--electron-scale");
        target.style.removeProperty("--nucleus-scale");
      });

      closest.classList.add("zoomed");
      if (!closest.style.getPropertyValue("--zoom")) {
        closest.style.setProperty("--zoom", "1.75");
      }
      if (closest.classList.contains("atom-diagram")) {
        const zoom = Number(closest.style.getPropertyValue("--zoom")) || 1.75;
        closest.style.setProperty("--electron-scale", (1 / zoom).toFixed(3));
        closest.style.setProperty("--nucleus-scale", nucleusScale(zoom));
      }
    }

    function updateWheelZoom(event) {
      const target = event.target.closest(".element-image, .atom-diagram");
      if (!target || !wikiTooltip.contains(target)) return;

      event.preventDefault();
      target.classList.add("zoomed");
      const currentZoom = Number(target.style.getPropertyValue("--zoom")) || 1.75;
      const nextZoom = Math.min(3.2, Math.max(1.25, currentZoom + (event.deltaY < 0 ? .18 : -.18)));
      target.style.setProperty("--zoom", nextZoom.toFixed(2));
      if (target.classList.contains("atom-diagram")) {
        target.style.setProperty("--electron-scale", (1 / nextZoom).toFixed(3));
        target.style.setProperty("--nucleus-scale", nucleusScale(nextZoom));
      }
    }

    async function hydrateWikiInfo(element) {
      const image = wikiTooltip.querySelector(".element-image");
      const link = wikiTooltip.querySelector(".wiki-link");
      if (!image || !link) return;

      const pageTitle = encodeURIComponent(wikiPageTitle(element).replaceAll(" ", "_"));
      const fallbackUrl = `https://cs.wikipedia.org/wiki/${pageTitle}`;
      link.href = fallbackUrl;

      if (!wikiCache.has(element.name)) {
        try {
          const response = await fetch(`https://cs.wikipedia.org/api/rest_v1/page/summary/${pageTitle}`);
          if (!response.ok) throw new Error("Wikipedia summary unavailable");
          const data = await response.json();
          wikiCache.set(element.name, {
            image: data.thumbnail?.source || "",
            url: data.content_urls?.desktop?.page || fallbackUrl
          });
        } catch {
          wikiCache.set(element.name, { image: "", url: fallbackUrl });
        }
      }

      const wikiData = wikiCache.get(element.name);
      if (wikiTooltip.dataset.symbol !== element.symbol) return;
      link.href = wikiData.url;
      const imageSource = imageFallbacks[element.symbol] || wikiData.image || "";
      if (imageSource) {
        image.src = imageSource;
        image.alt = `${element.name} - obrázek z Wikipedie`;
        image.classList.add("loaded");
      }
    }

      );

      if (top < 8) {
        top = rect.bottom + gap;
      }

      if (top + tooltipRect.height > window.innerHeight - 8) {
        top = window.innerHeight - tooltipRect.height - 8;
      }
      if (top < 8) {
        top = 8;
      }

      wikiTooltip.style.left = `${left}px`;
      wikiTooltip.style.top = `${top}px`;
      hydrateWikiInfo(element);
    }

    function normalize(value) {
      return value
        .trim()
        .toLocaleLowerCase("cs-CZ")
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "");
    }

    function pickQuestion() {
      window.clearTimeout(autoNextTimer);
      answerChecked = false;

      if (quizQueue.length > 0) {
        current = quizQueue.shift();
      } else if (quizDone) {
        return;
      } else {
        current = quizElements[Math.floor(Math.random() * quizElements.length)];
      }

      activeQuestionMode = mode === "mixed"
        ? (Math.random() < .5 ? "symbolToName" : "nameToSymbol")
        : mode;
      feedback.textContent = "";
      feedback.className = "feedback";
      answerInput.value = "";
      questionLabel.textContent = activeQuestionMode === "symbolToName" ? "Napiš název prvku" : "Napiš chemickou značku";
      questionText.textContent = activeQuestionMode === "symbolToName" ? current.symbol : current.name;
      answerInput.placeholder = activeQuestionMode === "symbolToName" ? "např. kyslík" : "např. O";
      answerInput.focus();
    }

    function expectedAnswer() {
      return activeQuestionMode === "symbolToName" ? current.name : current.symbol;
    }

    function checkAnswer() {
      if (answerChecked) {
        pickQuestion();
        return;
      }

      const answer = answerInput.value;
      if (!answer.trim()) {
        feedback.textContent = "Nejdřív napiš odpověď.";
        feedback.className = "feedback bad";
        return;
      }

      total += 1;
      answerChecked = true;
      const isCorrect = normalize(answer) === normalize(expectedAnswer());
      if (isCorrect) {
        correct += 1;
        feedback.textContent = "Správně.";
        feedback.className = "feedback ok";
      } else {
        feedback.textContent = `Špatně. Správná odpověď je ${expectedAnswer()}.`;
        feedback.className = "feedback bad";
        if (mode === "all") {
          wrongAnswers.push({ element: current, expected: expectedAnswer(), given: answer });
        }
      }
      score.textContent = `${correct} / ${total}`;

      if (mode === "all" && quizQueue.length === 0) {
        quizDone = true;
        setTimeout(showResults, 1000);
      } else {
        autoNextTimer = window.setTimeout(pickQuestion, 1000);
      }
    }

    function showResults() {
      quizCard.style.display = "none";
      if (wrongAnswers.length === 0) {
        resultsSummary.textContent = `Všechno správně! ${correct} / ${total}`;
        resultsList.style.display = "none";
      } else {
        resultsSummary.textContent = `Hotovo. ${correct} / ${total} správně. Problémové prvky:`;
        resultsList.innerHTML = wrongAnswers.map(w => {
          const modeText = w.element.symbol;
          return `<li class="wrong"><b>${modeText}</b> – tvoje odpověď: "${w.given}", správně: ${w.expected}</li>`;
        }).join("");
        resultsList.style.display = "";
      }
      quizResults.style.display = "";
    }

    function closeQuiz() {
      window.clearTimeout(autoNextTimer);

      const quiz = quizToggle.closest(".quiz");
      const rect = quiz.getBoundingClientRect();
      const dx = window.innerWidth - rect.right + 20;
      const dy = window.innerHeight - rect.bottom + 20;

      quiz.style.transition = "transform .35s ease, opacity .35s ease";
      quiz.style.transform = `translate(${dx}px, ${dy}px) scale(.5)`;
      quiz.style.opacity = "0";

      quiz.addEventListener("transitionend", () => {
        header.classList.remove("quiz-mode");
        quiz.classList.remove("open");
        quiz.classList.add("closed");
        quizToggle.style.display = "";
        quizBody.style.transition = "";
        quizBody.classList.remove("visible");
        quizBody.style.maxHeight = "";
        quizBody.style.opacity = "";
        tableShell.classList.remove("hidden");
        hideTooltip();
        clearTemporaryHighlight();
        quizQueue = [];
        wrongAnswers = [];
        quizDone = false;
        correct = 0;
        total = 0;
        score.textContent = "0 / 0";
        quizCard.style.display = "";
        quizResults.style.display = "none";
        answerChecked = false;
        current = null;
        quiz.style.transition = "";
        quiz.style.transform = "";
        quiz.style.opacity = "";
      }, { once: true });
    }

    quizToggle.addEventListener("click", () => {
      correct = 0;
      total = 0;
      score.textContent = "0 / 0";
      wrongAnswers = [];
      quizDone = false;
      quizCard.style.display = "";
      quizResults.style.display = "none";
      if (mode === "all") {
        quizQueue = [...quizElements].sort(() => Math.random() - 0.5);
      } else {
        quizQueue = [];
      }
      pickQuestion();
      header.classList.add("quiz-mode");
      const quiz = quizToggle.closest(".quiz");
      quiz.classList.remove("closed");
      quiz.classList.add("open");
      quizToggle.style.display = "none";
      tableShell.classList.add("hidden");
      quizBody.style.transition = "none";
      quizBody.classList.add("visible");
      quizBody.style.maxHeight = "600px";
      quizBody.style.opacity = "1";
      hideTooltip();
      clearTemporaryHighlight();

      const rect = quiz.getBoundingClientRect();
      const dx = window.innerWidth - rect.right + 20;
      const dy = window.innerHeight - rect.bottom + 20;
      quiz.style.transition = "none";
      quiz.style.transform = `translate(${dx}px, ${dy}px) scale(.5)`;
      quiz.style.opacity = "0";
      quiz.offsetHeight;
      quiz.style.transition = "transform .35s ease, opacity .35s ease";
      quiz.style.transform = "";
      quiz.style.opacity = "1";
      quiz.addEventListener("transitionend", () => {
        quiz.style.transition = "";
        quiz.style.transform = "";
        quiz.style.opacity = "";
        quizBody.style.transition = "";
      }, { once: true });
    });

    document.querySelectorAll("[data-mode]").forEach((button) => {
      button.addEventListener("click", () => {
        document.querySelectorAll("[data-mode]").forEach((item) => item.classList.remove("active"));
        button.classList.add("active");
        mode = button.dataset.mode;
        if (mode === "all") {
          quizQueue = [...quizElements].sort(() => Math.random() - 0.5);
        } else {
          quizQueue = [];
        }
        wrongAnswers = [];
        quizDone = false;
        correct = 0;
        total = 0;
        score.textContent = "0 / 0";
        quizCard.style.display = "";
        quizResults.style.display = "none";
        pickQuestion();
      });
    });

    document.getElementById("checkAnswer").addEventListener("click", checkAnswer);
    document.getElementById("nextQuestion").addEventListener("click", pickQuestion);
    document.getElementById("giveUp").addEventListener("click", closeQuiz);
    resultsClose.addEventListener("click", closeQuiz);
    answerInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        event.preventDefault();
        if (answerChecked) {
          pickQuestion();
        } else {
          checkAnswer();
        }
      }
    });
  </script>
</body>
</html>
